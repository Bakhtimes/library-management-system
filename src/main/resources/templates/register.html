<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reader Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .reg-card { width: 100%; max-width: 450px; padding: 20px; }
    </style>
</head>
<body class="bg-light">

<div class="card reg-card shadow-sm border-0">
    <div class="card-body">
        <h3 class="text-center mb-3">Create Account</h3>
        <p class="text-muted text-center mb-4">Register as a library reader</p>

        <div th:if="${param.error}" class="alert alert-danger py-2" role="alert">
            Username or email already exists.
        </div>

        <form th:action="@{/web/auth/register}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-control" required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-success w-100 py-2">Register</button>
        </form>

        <div class="mt-3 text-center">
            <small class="text-muted">Already have an account? <a href="/login" class="text-decoration-none">Sign In</a></small>
        </div>
    </div>
</div>

</body>
</html>
