<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
    </style>
</head>
<body class="bg-light">

<div class="card login-card shadow-sm border-0">
    <div class="card-body text-center">
        <h2 class="mb-3">📚 Library System</h2>
        <p class="text-muted mb-4">Please sign in to access your dashboard</p>

        <div th:if="${param.error}" class="alert alert-danger text-start py-2" role="alert">
            Invalid username or password.
        </div>

        <div th:if="${param.logout}" class="alert alert-success text-start py-2" role="alert">
            You have been successfully logged out.
        </div>

        <div th:if="${param.registered}" class="alert alert-success text-start py-2" role="alert">
            Account created successfully! Please sign in.
        </div>

        <form th:action="@{/login}" method="post" class="text-start">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Enter your username" required autofocus>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Sign In</button>
        </form>

        <div class="mt-3">
            <small class="text-muted">Don't have an account? <a href="/catalog" class="text-decoration-none">Browse Catalog</a></small>
        </div>
    </div>
</div>

</body>
</html>
