<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Book Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="/librarian/dashboard">📖 Library Workspace</a>
        <a href="/librarian/dashboard" class="btn btn-sm btn-outline-light">Back to Desk</a>
    </div>
</nav>

<div class="container" style="max-width: 600px;">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-white py-3 fw-bold text-warning">
            ✏️ Edit Book Metadata Records
        </div>
        <div class="card-body">

            <div th:if="${param.error}" class="alert alert-danger" th:text="${'⚠️ Error: ' + param.error}"></div>

            <form th:action="@{'/librarian/books/' + ${book.id} + '/edit'}" th:object="${book}" method="post">

                <div class="mb-3">
                    <label for="title" class="form-label fw-bold">Book Title</label>
                    <input type="text" id="title" th:field="*{title}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="author" class="form-label fw-bold">Author Name</label>
                    <input type="text" id="author" th:field="*{author}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="genre" class="form-label fw-bold">Genre/Category</label>
                    <input type="text" id="genre" th:field="*{genre}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label fw-bold">Description Snippet</label>
                    <textarea id="description" th:field="*{description}" class="form-control" rows="4"></textarea>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-warning w-100 py-2 fw-bold">Save Changes</button>
                    <a href="/librarian/dashboard" class="btn btn-outline-secondary w-50 py-2">Cancel</a>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
