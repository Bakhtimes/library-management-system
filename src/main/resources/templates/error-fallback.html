<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Application Encountered an Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

<div class="container text-center" style="max-width: 550px;">
    <div class="card shadow border-0 p-4">
        <div class="card-body">
            <h1 class="display-1 text-danger">⚠️</h1>
            <h3 class="fw-bold mb-2" th:text="${errorType}">Error Category</h3>

            <div class="bg-light p-3 rounded text-start border border-danger-subtle my-4">
                <code class="text-danger small d-block" th:text="${errorMessage}">Detailed system exception trace description text...</code>
            </div>

            <p class="text-muted small">If you believe this action should be authorized, please contact the library systems administrator desk.</p>

            <div class="d-grid gap-2 mt-4">
                <a href="/catalog" class="btn btn-primary py-2 fw-bold">Return to Public Catalog</a>
                <button onclick="history.back()" class="btn btn-outline-secondary btn-sm">Go Back to Previous Window</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
