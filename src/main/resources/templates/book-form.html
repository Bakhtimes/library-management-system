<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Register New Book</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="/librarian/dashboard">📖 Library Workspace</a>
        <a href="/librarian/dashboard" class="btn btn-sm btn-outline-light">Back to Desk</a>
    </div>
</nav>

<div class="container" style="max-width: 600px;">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-white py-3 fw-bold text-primary">
            ➕ Register New Book into System Catalog
        </div>
        <div class="card-body">

            <div th:if="${param.error}" class="alert alert-danger" th:text="${'⚠️ Error: ' + param.error}"></div>

            <form th:action="@{/librarian/books/new}" th:object="${book}" method="post">

                <div class="mb-3">
                    <label for="title" class="form-label">Book Title</label>
                    <input type="text" id="title" th:field="*{title}" class="form-control" placeholder="e.g., The Great Gatsby" required>
                </div>

                <div class="mb-3">
                    <label for="author" class="form-label">Author Name</label>
                    <input type="text" id="author" th:field="*{author}" class="form-control" placeholder="e.g., F. Scott Fitzgerald" required>
                </div>

                <div class="mb-3">
                    <label for="genre" class="form-label">Genre/Category</label>
                    <input type="text" id="genre" th:field="*{genre}" class="form-control" placeholder="e.g., Fiction, Classic" required>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Short Description Snippet</label>
                    <textarea id="description" th:field="*{description}" class="form-control" rows="3" placeholder="Provide a summary of the book content..."></textarea>
                </div>

                <hr class="my-4">

                <div class="mb-4 bg-light p-3 rounded border">
                    <label for="initialCopies" class="form-label fw-bold text-secondary">Initial Physical Inventory Count</label>
                    <input type="number" id="initialCopies" name="initialCopies" class="form-control" value="1" min="1" max="50" required>
                    <small class="text-muted d-block mt-1">This will automatically generate unique available item copy identifiers for barcodes/tracking.</small>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary w-100 py-2">Add Book to Inventory</button>
                    <a href="/librarian/dashboard" class="btn btn-outline-secondary w-50 py-2">Cancel</a>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
